<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <style>
      .title{font-family:Inter,Arial,sans-serif;font-size:46px;font-weight:800;fill:#0f1b33}
      .subtitle{font-family:Inter,Arial,sans-serif;font-size:25px;fill:#40516f}
      .section{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:800;letter-spacing:.4px}
      .label{font-family:Inter,Arial,sans-serif;font-size:21px;font-weight:800;fill:#111827}
      .small{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#2f3b52}
      .note{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#23436f}
      .legend-title{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:800;fill:#0f1b33}
      .legend-text{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#2f3b52}
      .yes{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:800;fill:#1f7a2f}
      .no{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:800;fill:#b91c1c}
      .box{fill:#fff;stroke-width:2}
      .arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrowHead)}
      .arrow-green{stroke:#2f8f46;stroke-width:3;fill:none;marker-end:url(#arrowHeadGreen)}
      .arrow-red{stroke:#cf3333;stroke-width:3;fill:none;marker-end:url(#arrowHeadRed)}
      .arrow-purple{stroke:#7c3aed;stroke-width:3;fill:none;marker-end:url(#arrowHeadPurple)}
      .dash{stroke-dasharray:9 7}
    </style>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".09"/>
    </filter>

    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
    </marker>
    <marker id="arrowHeadGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2f8f46"/>
    </marker>
    <marker id="arrowHeadRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#cf3333"/>
    </marker>
    <marker id="arrowHeadPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7c3aed"/>
    </marker>

    <linearGradient id="blueBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="purpleBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="orangeDiamond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="greenBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="30" y="58" class="title">Model-Driven Tool-Using Runtime</text>
  <text x="30" y="100" class="subtitle">The model decides; the runtime executes, checks, and records.</text>

  <!-- Main containers -->
  <rect x="30" y="130" width="1280" height="620" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="1350" y="130" width="420" height="620" rx="18" fill="#ffffff" stroke="#2f8f46" stroke-width="2"/>

  <text x="70" y="180" class="section" fill="#0969da">↻  DYNAMIC CONTROLLER LOOP</text>
  <text x="1380" y="180" class="section" fill="#2f8f46">🛡  RUNTIME HARNESS</text>

  <!-- User Request -->
  <rect x="70" y="270" width="230" height="110" rx="15" fill="url(#blueBox)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="115" cy="325" r="26" fill="none" stroke="#2563eb" stroke-width="5"/>
  <circle cx="115" cy="315" r="9" fill="#2563eb"/>
  <path d="M96 346 Q115 328 134 346" stroke="#2563eb" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="155" y="333" class="label">User Request</text>

  <!-- Messages -->
  <rect x="365" y="270" width="230" height="110" rx="15" fill="url(#purpleBox)" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="415" cy="315" r="18" fill="none" stroke="#7c3aed" stroke-width="4"/>
  <path d="M402 329 L394 342 L410 334" fill="#7c3aed"/>
  <text x="455" y="318" class="label">Messages</text>
  <text x="455" y="350" class="small">(History / Context)</text>

  <!-- LLM Controller -->
  <rect x="675" y="270" width="275" height="110" rx="15" fill="url(#blueBox)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="725" y="323" font-family="Inter,Arial,sans-serif" font-size="38" fill="#2563eb">🧠</text>
  <text x="785" y="318" class="label">LLM Controller</text>
  <text x="785" y="350" class="small">(Decides next step)</text>

  <!-- Tool needed diamond -->
  <polygon points="1110,255 1195,340 1110,425 1025,340" fill="url(#orangeDiamond)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="1082" y="319" font-family="Inter,Arial,sans-serif" font-size="34" fill="#d97706">🔧</text>
  <text x="1057" y="360" class="label">Tool needed</text>
  <text x="1080" y="392" class="label">now?</text>

  <!-- Enough info diamond -->
  <polygon points="815,455 930,570 815,685 700,570" fill="url(#purpleBox)" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="794" y="510" font-family="Inter,Arial,sans-serif" font-size="34" fill="#7c3aed">?</text>
  <text x="760" y="570" class="label">Enough info</text>
  <text x="775" y="602" class="label">to answer?</text>

  <!-- Final -->
  <rect x="435" y="615" width="285" height="95" rx="14" fill="url(#greenBox)" stroke="#2f8f46" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="480" cy="662" r="22" fill="none" stroke="#2f8f46" stroke-width="4"/>
  <path d="M468 661 L478 671 L493 650" stroke="#2f8f46" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="520" y="655" class="label" fill="#1f7a2f">FINAL ANSWER</text>
  <text x="520" y="685" class="small">Return answer</text>

  <!-- Clarify -->
  <rect x="980" y="615" width="300" height="95" rx="14" fill="#ffffff" stroke="#7c3aed" stroke-width="2" class="dash" filter="url(#shadow)"/>
  <text x="1020" y="667" font-family="Inter,Arial,sans-serif" font-size="31" fill="#7c3aed">💬</text>
  <text x="1075" y="655" class="label" fill="#5b21b6">CLARIFY / CHAT</text>
  <text x="1075" y="685" class="small">Ask for missing info</text>

  <!-- Harness boxes -->
  <rect x="1395" y="205" width="340" height="105" rx="14" fill="url(#greenBox)" stroke="#2f8f46" stroke-width="2" filter="url(#shadow)"/>
  <text x="1435" y="270" font-family="Inter,Arial,sans-serif" font-size="38" fill="#2f8f46">▣</text>
  <text x="1495" y="250" class="label">Tool Registry</text>
  <text x="1495" y="280" class="small">(Available tools &amp; schemas)</text>

  <rect x="1395" y="360" width="340" height="105" rx="14" fill="url(#greenBox)" stroke="#2f8f46" stroke-width="2" filter="url(#shadow)"/>
  <text x="1435" y="425" font-family="Inter,Arial,sans-serif" font-size="38" fill="#2f8f46">🛡</text>
  <text x="1495" y="405" class="label">Execution Policy</text>
  <text x="1495" y="435" class="small">(Guardrails &amp; Permissions)</text>

  <rect x="1395" y="515" width="340" height="105" rx="14" fill="url(#greenBox)" stroke="#2f8f46" stroke-width="2" filter="url(#shadow)"/>
  <text x="1435" y="580" font-family="Inter,Arial,sans-serif" font-size="38" fill="#2f8f46">◉</text>
  <text x="1495" y="560" class="label">Memory Store</text>
  <text x="1495" y="590" class="small">(State &amp; Knowledge)</text>

  <rect x="1395" y="670" width="340" height="105" rx="14" fill="url(#greenBox)" stroke="#2f8f46" stroke-width="2" filter="url(#shadow)"/>
  <text x="1435" y="735" font-family="Inter,Arial,sans-serif" font-size="38" fill="#2f8f46">▤</text>
  <text x="1495" y="715" class="label">Event Log</text>
  <text x="1495" y="745" class="small">(Audit &amp; Observability)</text>

  <!-- Arrows main -->
  <path d="M300 325 L360 325" class="arrow"/>
  <path d="M595 325 L670 325" class="arrow"/>
  <path d="M950 325 L1025 340" class="arrow"/>
  <path d="M1195 340 C1265 340 1295 310 1395 258" class="arrow-green"/>
  <text x="1265" y="308" class="yes">Yes</text>

  <path d="M1110 425 L1110 610" class="arrow"/>
  <text x="1130" y="498" class="no">No</text>

  <path d="M815 380 L815 455" class="arrow"/>
  <path d="M700 570 C655 570 635 615 720 615" class="arrow-green"/>
  <text x="645" y="520" class="yes">Yes</text>
  <path d="M930 570 C965 570 960 615 980 640" class="arrow-red"/>
  <text x="955" y="535" class="no">No</text>

  <path d="M435 662 C360 620 455 430 480 380" class="arrow"/>
  <path d="M1280 665 C1320 645 1350 600 1395 568" class="arrow-purple"/>

  <!-- Harness internal arrows -->
  <path d="M1565 310 L1565 360" class="arrow"/>
  <path d="M1565 465 L1565 515" class="arrow"/>
  <path d="M1565 620 L1565 670" class="arrow dash"/>

  <!-- Legend -->
  <rect x="30" y="780" width="1740" height="130" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="65" y="835" font-family="Inter,Arial,sans-serif" font-size="34" fill="#2563eb">🧠</text>
  <text x="125" y="825" class="legend-title">LLM Controller</text>
  <text x="125" y="850" class="legend-text">Decides what to do next</text>
  <text x="125" y="875" class="legend-text">based on messages and observations.</text>

  <line x1="385" y1="810" x2="385" y2="890" stroke="#d1d5db"/>
  <text x="430" y="835" font-family="Inter,Arial,sans-serif" font-size="34" fill="#d97706">🔧</text>
  <text x="490" y="825" class="legend-title">Tool Needed?</text>
  <text x="490" y="850" class="legend-text">If yes, runtime finds and</text>
  <text x="490" y="875" class="legend-text">executes the right tool safely.</text>

  <line x1="740" y1="810" x2="740" y2="890" stroke="#d1d5db"/>
  <text x="785" y="835" font-family="Inter,Arial,sans-serif" font-size="34" fill="#7c3aed">?</text>
  <text x="845" y="825" class="legend-title">Enough Info?</text>
  <text x="845" y="850" class="legend-text">If not enough info,</text>
  <text x="845" y="875" class="legend-text">ask user to clarify.</text>

  <line x1="1100" y1="810" x2="1100" y2="890" stroke="#d1d5db"/>
  <text x="1145" y="835" font-family="Inter,Arial,sans-serif" font-size="34" fill="#2f8f46">✓</text>
  <text x="1205" y="825" class="legend-title">Final Answer</text>
  <text x="1205" y="850" class="legend-text">Return answer when</text>
  <text x="1205" y="875" class="legend-text">confident and complete.</text>

  <line x1="1415" y1="810" x2="1415" y2="890" stroke="#d1d5db"/>
  <text x="1460" y="835" font-family="Inter,Arial,sans-serif" font-size="34" fill="#2f8f46">🛡</text>
  <text x="1520" y="825" class="legend-title">Runtime Harness</text>
  <text x="1520" y="850" class="legend-text">Executes tools, enforces policy,</text>
  <text x="1520" y="875" class="legend-text">manages memory, and logs everything.</text>

  <!-- Bottom note -->
  <rect x="30" y="925" width="1740" height="45" rx="12" fill="#f8fbff" stroke="#bfdbfe" stroke-width="1.3"/>
  <text x="65" y="955" class="note">ⓘ  If no tool is needed, the controller either answers directly or asks for one missing constraint.</text>
</svg>
